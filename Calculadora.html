<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Estilos/style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>
    <div id="Contenedor">
        <span id="Resultado">Resultado</span>
        <img src="ronaldo.gif" alt="">
    <div id="numeros">
        <!-- Botones numericos -->
        <button>0</button>
        <button id="n1">1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
    </div>
    <div id="operadores">
        <!-- Botones operadores -->
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
        <button>C</button>
        <button>=</button>
        <button>←</button>
    </div>
    </div>
<script src="Scripts/script.js"></script>
</body>
</html>
